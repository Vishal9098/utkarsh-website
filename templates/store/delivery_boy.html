{% extends 'base.html' %}
{% block title %}Share Location{% endblock %}
{% block content %}
<style>
  .loc-wrapper { max-width: 500px; margin: 60px auto; padding: 0 15px; text-align: center; }
  .loc-card { background: #fff; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); padding: 40px 30px; }
  .loc-icon { font-size: 4rem; margin-bottom: 16px; }
  .loc-card h2 { font-weight: 700; color: #1a7a45; margin-bottom: 8px; }
  .loc-card p { color: #666; font-size: 0.95rem; }
  .btn-start { background: linear-gradient(135deg, #1a7a45, #2ecc71); color: white; border: none; padding: 16px 40px; border-radius: 50px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 20px; width: 100%; }
  .btn-stop { background: #e74c3c; color: white; border: none; padding: 16px 40px; border-radius: 50px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 12px; width: 100%; display: none; }
  .status-box { margin-top: 20px; padding: 14px; border-radius: 12px; font-weight: 600; display: none; }
  .status-active { background: #e8f8ef; color: #1a7a45; }
  .status-error { background: #fde8e8; color: #e74c3c; }
  .order-info { background: #f8f9fa; border-radius: 12px; padding: 16px; margin-bottom: 20px; text-align: left; }
  .order-info p { margin: 4px 0; font-size: 0.9rem; color: #444; }
</style>

<div class="loc-wrapper">
  <div class="loc-card">
    <div class="loc-icon">📍</div>
    <h2>Location Share Karo</h2>
    <p>Customer real-time mein aapki location dekh sakta hai</p>

    <div class="order-info">
      <p><strong>Order:</strong> {{ order.order_id }}</p>
      <p><strong>Customer:</strong> {{ order.name }}</p>
      <p><strong>Address:</strong> {{ order.address }}, {{ order.city }}</p>
    </div>

    <button class="btn-start" onclick="startSharing()">📡 Location Sharing Shuru Karo</button>
    <button class="btn-stop" onclick="stopSharing()">⛔ Sharing Band Karo</button>
    <div class="status-box" id="statusBox"></div>
  </div>
</div>

<script>
  let watchId = null;
  const token = "{{ token }}";

  function startSharing() {
    if (!navigator.geolocation) {
      showStatus('❌ Aapka browser GPS support nahi karta', 'error');
      return;
    }
    document.querySelector('.btn-start').style.display = 'none';
    document.querySelector('.btn-stop').style.display = 'block';
    showStatus('📡 Location share ho rahi hai...', 'active');

    watchId = navigator.geolocation.watchPosition(
      function(pos) {
        sendLocation(pos.coords.latitude, pos.coords.longitude);
      },
      function(err) {
        showStatus('❌ Location access denied. Browser settings mein allow karo.', 'error');
      },
      { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
    );
  }

  function stopSharing() {
    if (watchId) navigator.geolocation.clearWatch(watchId);
    document.querySelector('.btn-start').style.display = 'block';
    document.querySelector('.btn-stop').style.display = 'none';
    showStatus('⛔ Location sharing band kar di', 'error');
  }

  function sendLocation(lat, lng) {
    fetch(`/delivery/location/${token}/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lat: lat, lng: lng })
    })
    .then(r => r.json())
    .then(data => {
      const now = new Date().toLocaleTimeString('en-IN');
      showStatus(`✅ Location updated: ${now}`, 'active');
    })
    .catch(() => showStatus('⚠️ Update fail hua, retry ho raha hai...', 'error'));
  }

  function showStatus(msg, type) {
    const box = document.getElementById('statusBox');
    box.style.display = 'block';
    box.className = 'status-box ' + (type === 'active' ? 'status-active' : 'status-error');
    box.innerHTML = msg;
  }
</script>
{% endblock %}
